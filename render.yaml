# Render Blueprint for Anansi Atlas (Django web service + managed Postgres).
# Deploy: push to GitHub, then in Render → New → Blueprint → pick this repo.
# Render reads this file, creates the database and web service, and wires DATABASE_URL.
#
# After the first deploy you MUST set (Render dashboard → service → Environment):
#   ALLOWED_HOSTS         e.g.  anansiatlas.com,www.anansiatlas.com,anansi-atlas.onrender.com
#   CSRF_TRUSTED_ORIGINS  e.g.  https://anansiatlas.com,https://www.anansiatlas.com
# and, once an email provider is chosen, the EMAIL_* vars below.
# SECRET_KEY is generated automatically. DATABASE_URL is injected from the database.

databases:
  - name: anansi-atlas-db
    databaseName: anansi
    user: anansi
    region: virginia         # US East — closest to the Central Florida / US audience
    plan: basic-256mb        # free tier expires after 90 days — use a paid tier for a real launch

services:
  - type: web
    name: anansi-atlas
    runtime: python
    region: virginia         # MUST match the database region (they talk constantly)
    plan: starter            # avoids the free tier's cold-start sleep; bump to standard if needed
    branch: main
    buildCommand: "pip install -r requirements/production.txt && python manage.py collectstatic --noinput"
    preDeployCommand: "python manage.py migrate"   # runs once per deploy, before traffic switches
    startCommand: "gunicorn openoutreach.wsgi:application --workers 3 --timeout 120"
    healthCheckPath: /anansi-atlas/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: anansi-atlas-db
          property: connectionString
      # Wildcard ".onrender.com" matches whatever subdomain Render assigns (e.g. the -t3e2
      # suffix) so the health check always passes. Add/confirm the real custom domain here.
      - key: ALLOWED_HOSTS
        value: ".onrender.com,anansiatlas.com,www.anansiatlas.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://anansiatlas.com,https://www.anansiatlas.com"
      # ── Email (waitlist still saves to DB if unset; these enable confirmation sends). ──
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
